host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/qoderwork/nmsappsrv
  description: |-
    Network Management System for small cell base stations (gNB/eNB/CPE).
    Provides device management, alarm monitoring, parameter configuration, firmware upgrade, performance metrics, and TR-069 ACS.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: NMS Application Server API
  version: "1.0"
paths:
  /devices:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of devices for the authenticated tenant
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: pageSize
        type: integer
      - description: Search keyword (matches device_name or serial_number)
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: List devices
      tags:
      - devices
    post:
      consumes:
      - application/json
      description: Creates a new device record
      parameters:
      - description: Device data
        in: body
        name: device
        required: true
        schema:
          $ref: '#/definitions/internal_device.CpeElement'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Create a device
      tags:
      - devices
  /devices/{id}:
    delete:
      consumes:
      - application/json
      description: Soft-deletes a device (sets deleted=true)
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Delete a device
      tags:
      - devices
    get:
      consumes:
      - application/json
      description: Returns a single device by its primary key
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Get device by ID
      tags:
      - devices
    put:
      consumes:
      - application/json
      description: Updates an existing device record
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      - description: Device data
        in: body
        name: device
        required: true
        schema:
          $ref: '#/definitions/internal_device.CpeElement'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Update a device
      tags:
      - devices
  /devices/import:
    post:
      consumes:
      - multipart/form-data
      description: Upload an Excel file to batch-import devices. Supports Add/Modify/Delete
        operations per row.
      parameters:
      - description: Excel file (.xlsx)
        in: formData
        name: file
        required: true
        type: file
      - description: Target device group ID
        in: formData
        name: deviceGroupId
        type: string
      - description: Device type (gnb/enb/cpe)
        enum:
        - gnb
        - enb
        - cpe
        in: formData
        name: deviceType
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/nmsappsrv_pkg_utils.Response'
      security:
      - BearerAuth: []
      summary: Import devices from Excel
      tags:
      - devices
securityDefinitions:
  BearerAuth:
    description: 'Bearer JWT token. Format: "Bearer {token}"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
