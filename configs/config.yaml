server:
  name: nmsappsrv
  port: 8080
  mode: release  # debug / release / test
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

database:
  host: 192.168.1.110
  port: 13306
  user: root
  password: root123456
  dbname: base_station
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  log_level: warn  # silent / error / warn / info

redis:
  host: 192.168.1.110
  port: 16379
  password: ""
  db: 0
  pool_size: 20

jwt:
  # Secret must be >=32 bytes. Override in production via NMS_JWT_SECRET env var.
  # Generate with: openssl rand -base64 48
  secret: ""

logger:
  filename: logs/nmsappsrv.log
  level: info       # debug / info / warn / error / dpanic / panic / fatal
  max_size_mb: 100
  max_backups: 10
  retention_days: 30
  compress: true
  stdout: true

tr069:
  acs_url: "http://0.0.0.0:8080/acs"
  inform_interval: 300
  connection_timeout: 30
  udp_connection_request_port: 50000

snmp:
  trap_listen_port: 162
  enterprise_oid: 31664
  default_version: v2c
  default_community: public

mq:
  # Redis-based message queue configuration
  operation_queue: "nms:operation_queue"
  inform_queue: "nms:inform_queue"
  event_result_queue: "nms:event_result_queue"
  alarm_queue: "nms:alarm_queue"
  snmp_queue: "nms:snmp_queue"
  web_callback_queue: "nms:web_callback_queue"
  pm_queue: "nms:pm_queue"

mail:
  aes_key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"  # 64 hex chars = 32-byte AES-256 key

ha:
  enabled: false
  vip_monitor_interval: 10  # seconds between VIP checks
  current_vip: ""           # current virtual IP address (set by HA subsystem)

platform_files:
  rsa_public_key_path: "./cert/password/publicKey.pem"
  nms_manual_doc_path: "./docs/nms_manual.pdf"
  platform_log_dir: "./logs/platform"

upgrade:
  upload_dir: ./data/upgrade-files

# Device-facing file server (/acs-file-server/**). Mirrors Java's @Value roots.
# nmsappsrv self-serves these files (ABSENT backfill, Option 1).
file_server:
  root: ./data/acs-file-server
  upgrade_dir: ./data/acs-file-server/upgrade
  config_dir: ./data/acs-file-server/config
  batch_process_dir: ./data/acs-file-server/batch-process
  log_dir: ./data/acs-file-server/log
  mr_dir: ./data/acs-file-server/mr
  capture_dir: ./data/acs-file-server/capture
  mml_result_dir: ./data/acs-file-server/mml-result
  pm_dir: ./data/acs-file-server/pm
  nrm_dir: ./data/acs-file-server/nrm
  device_mnormal_dir: ./data/acs-file-server/mnormal
  cm_file_path: ./data/acs-file-server/north-file
  piecemeal_temp_dir: ./data/acs-file-server/piecemeal-temp
  mr_ccs_export_dir: ./data/acs-file-server/mr-report
  # Device-download roots (FileDownload phase). Mirrors Java's caFilePath /
  # licenseFilePath / AOS ztp path. Defaults live under root when unset.
  ca_dir: ./data/acs-file-server/ca
  license_dir: ./data/acs-file-server/license
  ztp_dir: ./data/acs-file-server/ztp

license:
  # Gate all authenticated endpoints unless a valid license is active.
  # Override at runtime with NMS_LICENSE_REQUIRED=false for a dev/test instance.
  required: true
  # Where the verified envelope is persisted on disk (survives restarts).
  install_dir: ./data/license
  # Empty => embedded default public key is used. Set to a PKIX PEM path to
  # rotate the verifying key without recompiling.
  # public_key_path: ""
  # Empty => <install_dir>/.maxclock. Persists the anti-rollback max-time.
  # max_clock_file: ""
  # Dev/test only: force the verifying fingerprint (e.g. the value emitted by
  # `license-tool fingerprint` on the target host). Leave empty in production so
  # the real host system-uuid (dmidecode -s system-uuid) is used.
  # machine_fingerprint_override: ""
