      filter: ''
      display: "FQDN"
      comment: ""
    - name: "priority"
      type: "int"
      value: "1"
      access: "read-write"
      filter: "0~4095"
      display: "Priority"
      comment: ""
    - name: "capacity"
      type: "int"
      value: "4096"
      access: "read-write"
      filter: "0~65535"
      display: "Capacity"
      comment: ""
    - name: "groupId"
      type: "string"
      value: "0"
      access: "read-write"
      filter: ''
      display: "Group ID"
      comment: ""
    - name: "supportedPlmn1"
      type: "string"
      value: "00101"
      access: "read-write"
      filter: '^\d{5,6}$'
      display: "Supported Plmn1"
      comment: ""
    - name: "supportedPlmn2"
      type: "string"
      value: "00101"
      access: "read-write"
      filter: '^\d{5,6}$'
      display: "Supported Plmn2"
      comment: ""
    - name: "supportedPlmn3"
      type: "string"
      value: "00101"
      access: "read-write"
      filter: '^\d{5,6}$'
      display: "Supported Plmn3"
      comment: ""
    - name: "supportedPlmn4"
      type: "string"
      value: "00101"
      access: "read-write"
      filter: '^\d{5,6}$'
      display: "Supported Plmn4"
      comment: ""
    - name: "supiRanges"
      type: "regex"
      value: "imsi-001010100080000~imsi-001010100080099"
      access: "read-write"
      filter: '^imsi-\d{15}~imsi-\d{15}$'
      display: "SUPI Ranges"
      comment: ""
    - name: "gpsiRanges"
      type: "regex"
      value: "msisdn-69072000~msisdn-69072099"
      access: "read-write"
      filter: '^msisdn-\d{2,15}~msisdn-\d{2,15}$'
      display: "GPSI Ranges"
      comment: ""
    - name: "scheme"
      type: "enum"
      value: "0"
      access: "read-write"
      filter: "{\"0\":\"HTTP\", \"1\":\"HTTPS\"}"
      display: "Scheme"
      comment: ""
    - name: "redisLink"
      type: "enum"
      value: '0'
      access: "read-write"
      filter: "{\"0\":\"TCP\",\"1\":\"SCTP\"}"
      display: "Redis Link"
      comment: ""
    - name: "redisAddr"
      type: "string"
      value: "172.16.5.140:6379"
