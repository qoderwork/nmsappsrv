        access: "read-only"
        filter: "0~65535"
        display: "SGs MME Port"
        comment: "0~65535"
      - name: "s6aIdentity"
        type: "string"
        value: "mme.epc.mnc001.mcc001.3gppnetwork.org"
        access: "read-write"
        filter: "0~100"
        display: "S6A MME Identity"
        comment: "0~100"
      - name: "localIp"
        type: "string"
        value: "172.16.5.220"
        access: "read-write"
        filter: "0~20"
        display: "S6A MME IP"
        comment: "0~20"
  gummei:
    display: "Gummei List"
    array:
      - name: "index"
        type: "int"
        value: "0"
        access: "read"
        filter: "0~15"
        display: "Index"
        comment: "0~15"
      - name: "plmnId"
        type: "regex"
        value: "00101"
        access: "read-write"
        filter: "^[0-9]{5,6}$"
        display: "PLMN ID"
        comment: "^[0-9]{5,6}$"
      - name: "groupId"
        type: "int"
        value: "4"
        access: "read-write"
        filter: "0~65535"
        display: "Group ID"
        comment: "0~65535"
      - name: "code"
        type: "int"
        value: "1"
        access: "read-write"
        filter: "0~255"
        display: "Code"
        comment: "0~255"
