mme:
  system:
    display: "System Config"
    list:
      - name: "csfbEnabled"
        type: "bool"
        value: "false"
        access: "read-write"
        filter: '{"0":"false","1":"true"}'
        display: "CSFB Enabled"
        comment: "true|false"
      - name: "volteEnabled"
        type: "bool"
        value: "false"
        access: "read-write"
        filter: '{"0":"false","1":"true"}'
        display: "VoLTE Enabled"
        comment: "true|false"
      - name: "s1MmeIp"
        type: "string"
        value: "192.168.1.179"
        access: "read-write"
        filter: "0~64"
        display: "S1 MME IP"
        comment: "0~64"
      - name: "s1MmePort"
        type: "int"
        value: "36412"
        access: "read-only"
        filter: "0~65535"
        display: "S1 MME Port"
        comment: "0~65535"
      - name: "s11MmeIp"
        type: "string"
        value: "192.168.1.179"
        access: "read-write"
        filter: "0~64"
        display: "S11 MME IP"
        comment: "0~64"
      - name: "s11MmePort"
