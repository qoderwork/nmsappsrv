upf:
  general:
    display: "General"
    list:
    - name: "configFileDirectory"
      type: "string"
      value: "/usr/local/etc/upf/"
      access: "read-write"
      filter: ''
      display: "Config File Directory"
      comment: ""
    - name: "exeFileDirectory"
      type: "string"
      value: "/usr/local/bin/"
      access: "read-write"
      filter: ''
      display: "EXE File Directory"
      comment: ""
    - name: "systemId"
      type: "int"
      value: "1"
      access: "read-write"
      filter: ''
      display: "System ID"
      comment: "1~255"
    - name: "dataForwarderNum"
      type: "int"
      value: "1"
      access: "read-write"
      filter: '1~8'
      display: "Data Forwarder Number"
      comment: "1~8"
    - name: "commonStatisticInterval"
      type: "int"
      value: "60"
      access: "read-write"
      filter: ''
      display: "Common Statistic Interval"
      comment: ""
    - name: "userStatisticInterval"
      type: "int"
      value: "60"
      access: "read-write"
      filter: ''
      display: "User Statistic Interval"
      comment: ""
    - name: "rxN3OverLoadThresholdMbps"
      type: "int"
      value: "0"
      access: "read-write"
      filter: ''
      display: "RX N3 OverLoad Threshold Mbps"
      comment: ""
    - name: "rxN6OverLoadThresholdMbps"
      type: "int"
      value: "0"
      access: "read-write"
      filter: ''
      display: "RX N6 OverLoad Threshold Mbps"
      comment: ""
    - name: "checksumOffload"
      type: "int"
      value: "0"
      access: "read-write"
      filter: '0~255'
      display: "Checksum Offload"
      comment: "0~255"
    - name: "maxDownlinkBufferNum"
      type: "int"
      value: "50"
      access: "read-write"
      filter: ''
      display: "Max Downlink Buffer Num"
      comment: ""
  logger:
    display: "Logger"
    list:
      - name: "logFileFullPath"
